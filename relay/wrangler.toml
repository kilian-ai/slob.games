name = "traits-relay"
main = "src/index.js"
compatibility_date = "2024-09-23"
workers_dev = true

routes = [
  { pattern = "relay.traits.build", custom_domain = true },
  { pattern = "relay.slob.games", custom_domain = true }
]

[durable_objects]
bindings = [
  { name = "RELAY", class_name = "RelaySession" },
  { name = "GAME_ROOM", class_name = "GameRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelaySession"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["GameRoom"]
